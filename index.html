<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Цитадель: Эволюция и Бой — FULL EDITION</title>
    <style>
        /* АНИМАЦИИ */
        @keyframes damagePop { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }
        @keyframes step { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }
        @keyframes gradient-anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes ringGrow { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2); opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px, 5px); } 75% { transform: translate(5px, -5px); } }
        @keyframes moneyShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); color: #ff5252; } 75% { transform: translateX(10px); color: #ff5252; } }

        :root { --gold: #ffc107; --skin: #ffccbc; --neon: #00f2ff; }
        body { margin: 0; background: #1b5e20; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; user-select: none; }

        /* ИНТЕРФЕЙС */
        #ui { 
            position: absolute; left: 0; top: 0; width: 320px; height: 100vh; background: #111; 
            padding: 20px; border-right: 4px solid var(--gold); z-index: 1000; box-sizing: border-box; overflow-y: auto;
        }
        .stat { font-size: 18px; margin-bottom: 8px; color: var(--gold); font-weight: bold; }
        .era-tag { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        
        .btn-grad {
            width: 100%; padding: 12px; margin: 5px 0; font-size: 12px;
            background: linear-gradient(-45deg, #3e2723, #5d4037, #8d6e63, #3e2723);
            background-size: 400% 400%; animation: gradient-anim 5s ease infinite;
            border: 2px solid var(--gold); color: white; cursor: pointer; border-radius: 6px; 
            font-weight: bold; text-transform: uppercase; transition: 0.2s;
        }
        .btn-grad:hover { transform: scale(1.02); filter: brightness(1.2); }
        .btn-grad:disabled { opacity: 0.3; cursor: not-allowed; }
        #battle-btn { background: linear-gradient(to bottom, #f44336, #b71c1c); font-size: 18px; height: 55px; margin-top: 10px; }
        .money-error { animation: moneyShake 0.4s ease-in-out; }

        /* ПОЛЕ */
        #field { position: absolute; left: 320px; top: 0; right: 0; bottom: 0; background: radial-gradient(circle, #2e7d32, #1b5e20); overflow: hidden; }
        #profile-bar { position: absolute; top: 10px; left: 330px; display: flex; gap: 8px; z-index: 2000; }
        .profile-btn { padding: 5px 12px; background: #222; border: 1px solid var(--gold); color: #fff; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .profile-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        /* ЗАМОК */
        #castle-wrap { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 200px; height: 300px; display: flex; align-items: flex-end; justify-content: center; z-index: 10; }
        .tower { border: 3px solid #111; transition: 0.5s; background: #607d8b; }
        .t-side { width: 40px; height: 50%; border-radius: 5px 5px 0 0; }
        .t-main { width: 100px; height: 80%; margin: 0 -5px; z-index: 2; border-radius: 8px 8px 0 0; position: relative; }
        #gate { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 50px; background: #3e2723; border: 2px solid var(--gold); border-radius: 20px 20px 0 0; }

        /* ЮНИТЫ */
        .unit { position: absolute; width: 40px; height: 60px; transition: left 0.1s linear; transform-origin: bottom; }
        .h-body { width: 20px; height: 25px; border: 1px solid #000; position: absolute; top: 15px; left: 10px; border-radius: 3px; }
        .h-head { width: 14px; height: 14px; background: var(--skin); border-radius: 50%; position: absolute; top: 2px; left: 13px; border: 1px solid #000; }
        .h-leg { width: 6px; height: 15px; background: #222; position: absolute; top: 40px; }
        .l { left: 10px; } .r { left: 24px; }
        .walking .l { animation: step 0.2s infinite alternate; }
        .walking .r { animation: step 0.2s infinite alternate-reverse; }
        
        .hp-bar { position: absolute; top: -10px; width: 100%; height: 4px; background: #000; border: 1px solid #fff; }
        .hp-fill { height: 100%; background: #4caf50; width: 100%; }
        .w-ico { position: absolute; font-size: 20px; top: 5px; right: -10px; }

        /* ЭФФЕКТЫ */
        .meteor { position: absolute; width: 30px; height: 30px; background: radial-gradient(circle, #ffeb3b, #f44336); border-radius: 50%; z-index: 5000; box-shadow: 0 0 20px #ff5722; transition: transform 0.4s; }
        .ring { position: absolute; border: 3px solid var(--gold); border-radius: 50%; animation: ringGrow 0.5s forwards; pointer-events: none; }
        #log { position: absolute; bottom: 15px; right: 15px; width: 300px; height: 100px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); padding: 10px; font-size: 12px; border-radius: 8px; overflow-y: auto; pointer-events: none; z-index: 3000; }
        .shake-anim { animation: shake 0.3s; }
    </style>
</head>
<body>

<div id="profile-bar">
    <div id="profile-list"></div>
    <button class="profile-btn" onclick="createNewProfile()" style="background:#2e7d32;">+ НОВЫЙ</button>
</div>

<div id="ui">
    <div id="era-tag" class="era-tag">ЭПОХА: СРЕДНЕВЕКОВЬЕ</div>
    <div class="stat">💰 ЗОЛОТО: <span id="money">0</span></div>
    <div class="stat">🏰 ДВОРЕЦ: <span id="lvl">1</span></div>
    <div class="stat">⚔️ БОЙ: <span id="battleNum">1</span></div>
    <div id="meteor-ui" style="color:#ff5722; font-weight:bold; margin-bottom:10px;">☄️ МЕТЕОРИТЫ: ГОТОВЫ</div>
    
    <button class="btn-grad" onclick="addMoney()">💎 СОБРАТЬ НАЛОГИ</button>
    <button class="btn-grad" id="upBtn" onclick="upgrade()">🏛️ УЛУЧШИТЬ ДВОРЕЦ (<span id="upCost">50</span>)</button>
    <hr>
    
    <div id="shop-1">
        <button class="btn-grad" onclick="buy('sword')">⚔️ Мечник (10)</button>
        <button class="btn-grad" onclick="buy('mace')">🔨 Булавоносец (50)</button>
        <button class="btn-grad" onclick="buy('giant')">👹 Гигант (500)</button>
    </div>
    <div id="shop-2" style="display:none">
        <button class="btn-grad" onclick="buy('soldier')">🔫 Автоматчик (5k)</button>
        <button class="btn-grad" onclick="buy('tank')">📟 Танк (25k)</button>
    </div>
    <div id="shop-3" style="display:none">
        <button class="btn-grad" onclick="buy('titan')">🗿 Титан (250k)</button>
        <button class="btn-grad" onclick="buy('ultimate_titan')">🌌 ULTIMATE (10M)</button>
    </div>

    <button class="btn-grad" id="battle-btn" onclick="startBattle()">⚔️ В БОЙ!</button>
    <button id="era-btn" class="btn-grad" onclick="checkEraTransfer()" style="display:none; background:var(--neon); color:#000;">🚀 НОВАЯ ЭРА</button>
    <button class="btn-grad" onclick="deleteCurrentProfile()" style="background:#333; color:red; font-size:10px;">УДАЛИТЬ МИР</button>
</div>

<div id="field">
    <div id="castle-wrap">
        <div class="tower t-side" id="ts1"></div>
        <div class="tower t-main" id="tm"><div id="gate"></div></div>
        <div class="tower t-side" id="ts2"></div>
    </div>
    <div id="units-layer"></div>
    <div id="log">Добро пожаловать, Лорд! Пкм по полю - Метеориты.</div>
</div>

<script>
    const config = {
        sword: { ico: '⚔️', cost: 10, hp: 100, dmg: 20, e: 1, color: '#1565c0' },
        mace: { ico: '🔨', cost: 50, hp: 200, dmg: 45, e: 1, color: '#6d4c41' },
        giant: { ico: '👹', cost: 500, hp: 1500, dmg: 150, e: 1, color: '#1b5e20', scale: 1.5 },
        soldier: { ico: '🔫', cost: 5000, hp: 5000, dmg: 800, e: 2, color: '#2e7d32' },
        tank: { ico: '📟', cost: 25000, hp: 40000, dmg: 3500, e: 2, color: '#37474f', scale: 2 },
        titan: { ico: '🗿', cost: 250000, hp: 200000, dmg: 15000, e: 3, color: '#424242', scale: 3 },
        ultimate_titan: { ico: '🌌', cost: 10000000, hp: 5000000, dmg: 200000, e: 3, color: '#000', scale: 4.5 }
    };

    let activeProfileName = "", profiles = {}, inBattle = false;
    let activeP = [], activeE = [], meteorTimer = 0;
    const STORAGE_KEY = 'citadel_v13_final';
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); }

    function playSnd(f, t, d, v) {
        try {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
        } catch(e){}
    }

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) profiles = JSON.parse(saved);
        if(!Object.keys(profiles).length) {
            profiles["Лорд"] = { money: 100, lvl: 1, upCost: 50, era: 1, battleNum: 1, armyInv: [], bossDefeated: false };
            activeProfileName = "Лорд";
        } else {
            activeProfileName = Object.keys(profiles)[0];
        }
        
        setInterval(() => {
            if(meteorTimer > 0) {
                meteorTimer--;
                document.getElementById('meteor-ui').innerText = `☄️ МЕТЕОРИТЫ: ${meteorTimer}с`;
            } else {
                document.getElementById('meteor-ui').innerText = `☄️ МЕТЕОРИТЫ: ГОТОВЫ`;
            }
        }, 1000);

        renderProfiles(); loadProfile();
    }

    function loadProfile() {
        const p = profiles[activeProfileName];
        if(!p) return;
        document.getElementById('money').innerText = Math.floor(p.money);
        document.getElementById('lvl').innerText = p.lvl;
        document.getElementById('upCost').innerText = Math.floor(p.upCost);
        document.getElementById('battleNum').innerText = p.battleNum;
        document.getElementById('era-tag').innerText = `ЭПОХА: ${['','СРЕДНЕВЕКОВЬЕ','МОДЕРН','КОСМОС'][p.era]}`;
        
        for(let i=1; i<=3; i++) {
            const s = document.getElementById(`shop-${i}`);
            if(s) s.style.display = (p.era === i ? 'block' : 'none');
        }

        const eraBtn = document.getElementById('era-btn');
        if(p.lvl >= p.era*10 && p.bossDefeated && p.era < 3) eraBtn.style.display = 'block';
        else eraBtn.style.display = 'none';

        updateCastleGraphics(p.lvl, p.era);
    }

    function updateCastleGraphics(lvl, era) {
        const c = ['', '#607d8b', '#263238', '#006064'][era];
        const towers = document.querySelectorAll('.tower');
        towers.forEach(t => t.style.background = c);
        document.getElementById('tm').style.height = Math.min(95, 60 + lvl*2) + '%';
    }

    function renderProfiles() {
        const list = document.getElementById('profile-list');
        list.innerHTML = "";
        Object.keys(profiles).forEach(name => {
            const b = document.createElement('button');
            b.className = `profile-btn ${name === activeProfileName ? 'active' : ''}`;
            b.innerText = name;
            b.onclick = () => { if(!inBattle) { activeProfileName = name; renderProfiles(); loadProfile(); } };
            list.appendChild(b);
        });
    }

    function addMoney() {
        let p = profiles[activeProfileName];
        p.money += (p.lvl * 10 * p.era);
        playSnd(800, 'sine', 0.1, 0.1);
        loadProfile();
    }

    function buy(type) {
        let p = profiles[activeProfileName];
        if(p.money >= config[type].cost) {
            p.money -= config[type].cost;
            p.armyInv.push({ type });
            save(); loadProfile();
            playSnd(1000, 'sine', 0.1, 0.1);
        } else {
            const m = document.getElementById('money').parentElement;
            m.classList.add('money-error');
            setTimeout(() => m.classList.remove('money-error'), 400);
        }
    }

    function upgrade() {
        let p = profiles[activeProfileName];
        if(p.money >= p.upCost && p.lvl < p.era*10) {
            p.money -= p.upCost; p.lvl++; p.upCost *= 1.6;
            save(); loadProfile(); playSnd(500, 'triangle', 0.3, 0.2);
        }
    }

    // --- СИСТЕМА БОЯ ---
    function startBattle() {
        if(inBattle) return;
        let p = profiles[activeProfileName];
        if(p.armyInv.length === 0) { alert("Армия пуста!"); return; }

        inBattle = true;
        document.getElementById('units-layer').innerHTML = "";
        activeP = []; activeE = [];
        
        // Спавн игрока
        p.armyInv.forEach((u, i) => {
            setTimeout(() => spawnUnit(u.type, true), i * 400);
        });

        // Спавн врагов
        const enemyCount = 3 + p.battleNum;
        for(let i=0; i < enemyCount; i++) {
            setTimeout(() => spawnUnit(getRandomEnemyType(p.era), false), i * 600);
        }

        requestAnimationFrame(battleLoop);
    }

    function spawnUnit(type, isPlayer) {
        const conf = config[type];
        const el = document.createElement('div');
        el.className = 'unit walking';
        el.innerHTML = `
            <div class="hp-bar"><div class="hp-fill"></div></div>
            <div class="h-head"></div>
            <div class="h-body" style="background:${conf.color}"></div>
            <div class="h-leg l"></div><div class="h-leg r"></div>
            <div class="w-ico">${conf.ico}</div>
        `;
        if(conf.scale) el.style.transform = `scale(${conf.scale})`;
        document.getElementById('units-layer').appendChild(el);

        const obj = { 
            el, hp: conf.hp, maxHp: conf.hp, dmg: conf.dmg, 
            isPlayer, x: isPlayer ? 50 : 800, y: 150 + Math.random()*150 
        };
        if(isPlayer) activeP.push(obj); else activeE.push(obj);
        updateUIUnit(obj);
    }

    function battleLoop() {
        if(!inBattle) return;

        // Движение и атака
        activeP.forEach(p => {
            const target = activeE.sort((a,b) => a.x - b.x)[0];
            if(target && Math.abs(p.x - target.x) < 40) {
                p.el.classList.remove('walking');
                target.hp -= p.dmg/60; 
                updateUIUnit(target);
            } else {
                p.el.classList.add('walking');
                p.x += 1.5;
            }
        });

        activeE.forEach(e => {
            const target = activeP.sort((a,b) => b.x - a.x)[0];
            if(target && Math.abs(e.x - target.x) < 40) {
                e.el.classList.remove('walking');
                target.hp -= e.dmg/60;
                updateUIUnit(target);
            } else {
                e.el.classList.add('walking');
                e.x -= 1.2;
            }
        });

        activeP = activeP.filter(u => { if(u.hp <= 0) { u.el.remove(); return false; } return true; });
        activeE = activeE.filter(u => { if(u.hp <= 0) { u.el.remove(); return false; } return true; });

        activeP.forEach(u => { u.el.style.left = u.x + 'px'; u.el.style.top = u.y + 'px'; u.el.style.zIndex = Math.floor(u.y); });
        activeE.forEach(u => { u.el.style.left = u.x + 'px'; u.el.style.top = u.y + 'px'; u.el.style.zIndex = Math.floor(u.y); });

        if(activeE.length === 0) endBattle(true);
        else if(activeP.length === 0) endBattle(false);
        else requestAnimationFrame(battleLoop);
    }

    function updateUIUnit(u) {
        const fill = u.el.querySelector('.hp-fill');
        fill.style.width = (u.hp / u.maxHp * 100) + '%';
    }

    function endBattle(win) {
        inBattle = false;
        let p = profiles[activeProfileName];
        if(win) {
            addLog(`ПОБЕДА! Бой #${p.battleNum} пройден.`);
            p.money += p.battleNum * 100;
            p.battleNum++;
            if(p.battleNum % 5 === 0) { p.bossDefeated = true; addLog("БОСС ПОВЕРЖЕН! Путь к эволюции открыт."); }
        } else {
            addLog("ПОРАЖЕНИЕ... Армия разбита.");
            p.armyInv = [];
        }
        save(); loadProfile();
    }

    function getRandomEnemyType(era) {
        const types = Object.keys(config).filter(k => config[k].e === era);
        return types[Math.floor(Math.random()*types.length)];
    }

    function spawnMeteorRain(tx, ty) {
        if(meteorTimer > 0) return;
        meteorTimer = 35;
        addLog("ВНИМАНИЕ: ОГНЕННЫЙ ДОЖДЬ!");
        for(let i=0; i<10; i++) {
            setTimeout(() => {
                const ox = (Math.random()-0.5)*150, oy = (Math.random()-0.5)*50;
                const m = document.createElement('div'); m.className = 'meteor';
                m.style.left = (tx + ox) + 'px'; m.style.top = '-50px';
                document.body.appendChild(m);
                setTimeout(() => m.style.transform = `translateY(${ty + oy + 50}px)`, 20);
                setTimeout(() => {
                    const r = document.createElement('div'); r.className = 'ring';
                    r.style.left = (tx+ox)+'px'; r.style.top = (ty+oy)+'px';
                    document.body.appendChild(r); setTimeout(()=>r.remove(), 500);
                    playSnd(100, 'sawtooth', 0.4, 0.2);
                    activeE.forEach(e => {
                        if(Math.abs((e.x+320) - (tx+ox)) < 100) { e.hp -= 2000 * profiles[activeProfileName].era; updateUIUnit(e); }
                    });
                    m.remove();
                }, 400);
            }, i*150);
        }
    }

    window.oncontextmenu = (e) => { e.preventDefault(); if(e.clientX > 320) spawnMeteorRain(e.clientX, e.clientY); };
    
    function createNewProfile() {
        const n = prompt("Имя Лорда:");
        if(n) {
            profiles[n] = { money: 100, lvl: 1, upCost: 50, era: 1, battleNum: 1, armyInv: [], bossDefeated: false };
            activeProfileName = n; save(); renderProfiles(); loadProfile();
        }
    }

    function deleteCurrentProfile() {
        if(Object.keys(profiles).length <= 1) return;
        if(confirm("Удалить этот мир?")) {
            delete profiles[activeProfileName];
            activeProfileName = Object.keys(profiles)[0];
            save(); location.reload();
        }
    }

    function checkEraTransfer() {
        let p = profiles[activeProfileName];
        p.era++; p.bossDefeated = false; p.battleNum = 1;
        p.money += 5000;
        addLog("ЭВОЛЮЦИЯ ЗАВЕРШЕНА!");
        save(); loadProfile();
    }

    init();
</script>
</body>
</html>
