<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Цитадель: Эволюция Титанов — ULTRA EDITION</title>
    <style>
        /* АНИМАЦИИ */
        @keyframes damagePop { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-70px); opacity: 0; } }
        @keyframes step { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }
        @keyframes gradient-anim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes ringGrow { 0% { transform: translate(-50%, -50%) scale(0.1); opacity: 1; border-width: 10px; } 100% { transform: translate(-50%, -50%) scale(4); opacity: 0; border-width: 1px; } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 10% { transform: translate(-8px, -5px); } 30% { transform: translate(8px, 5px); } 50% { transform: translate(-5px, 8px); } 70% { transform: translate(5px, -8px); } }

        :root { --gold: #ffc107; --neon: #00f2ff; --fire: #ff5722; }
        body { margin: 0; background: #1b5e20; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; user-select: none; }

        /* ИНТЕРФЕЙС */
        #ui { position: absolute; left: 0; top: 0; width: 320px; height: 100vh; background: #0a0a0a; padding: 20px; border-right: 4px solid var(--gold); z-index: 1000; box-sizing: border-box; overflow-y: auto; }
        .stat { font-size: 18px; margin-bottom: 6px; color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .era-tag { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 4px; font-size: 14px; margin-bottom: 15px; display: inline-block; font-weight: 900; }
        
        .btn-grad {
            width: 100%; padding: 12px; margin: 5px 0; font-size: 11px;
            background: linear-gradient(-45deg, #212121, #424242, #212121);
            background-size: 400% 400%; animation: gradient-anim 5s linear infinite;
            border: 2px solid var(--gold); color: white; cursor: pointer; border-radius: 6px; 
            font-weight: bold; text-transform: uppercase; transition: 0.2s;
        }
        .btn-grad:hover { transform: scale(1.03); filter: brightness(1.3); box-shadow: 0 0 15px var(--gold); }
        #battle-btn { background: linear-gradient(to bottom, #f44336, #b71c1c); font-size: 18px; height: 60px; border-color: #fff; margin-top: 20px; }

        #field { position: absolute; left: 320px; top: 0; right: 0; bottom: 0; background: radial-gradient(circle, #2e7d32, #1b5e20); overflow: hidden; }
        .shake-anim { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        /* КРЕПОСТЬ */
        #castle-wrap { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); width: 280px; height: 450px; z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
        .tower { border: 4px solid #000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; background: #37474f; }
        .t-side { width: 60px; height: 40%; border-radius: 8px 8px 0 0; }
        .t-main { width: 160px; height: 70%; z-index: 2; border-radius: 12px 12px 0 0; margin: 0 -10px; }
        #gate { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 70px; height: 90px; background: #2b1d1d; border: 3px solid var(--gold); border-radius: 35px 35px 0 0; transition: 1s; }
        #gate.open { transform: translateX(-50%) scaleY(0.1); }

        /* ЮНИТЫ */
        .unit { position: absolute; width: 50px; height: 80px; z-index: 200; transition: left 0.1s linear; transform-origin: bottom center; }
        .h-body { width: 24px; height: 32px; border: 2px solid #000; position: absolute; top: 16px; left: 13px; border-radius: 4px; }
        .h-head { width: 18px; height: 18px; background: #ffccbc; border-radius: 50%; position: absolute; top: 0; left: 16px; border: 2px solid #000; }
        .h-leg { width: 9px; height: 24px; background: #111; position: absolute; top: 48px; border-radius: 2px; transform-origin: top; }
        .l { left: 13px; } .r { left: 28px; }
        .walking .l { animation: step 0.25s infinite alternate; }
        .walking .r { animation: step 0.25s infinite alternate-reverse; }
        
        .hp-bar { position: absolute; top: -15px; width: 100%; height: 6px; background: #000; border: 1px solid #fff; border-radius: 3px; overflow: hidden; }
        .hp-fill { height: 100%; background: #4caf50; width: 100%; transition: 0.2s; }
        .w-ico { position: absolute; font-size: 26px; top: 10px; right: -18px; filter: drop-shadow(0 0 5px white); }
        .veteran::before { content: '⭐'; position: absolute; top: -45px; left: 15px; color: #ffeb3b; font-size: 20px; text-shadow: 0 0 10px orange; animation: gradient-anim 2s infinite; }

        /* СПЕЦЭФФЕКТЫ */
        .ring { position: absolute; border: 6px solid var(--fire); border-radius: 50%; animation: ringGrow 0.6s ease-out forwards; pointer-events: none; z-index: 5500; }
        .meteor { position: absolute; width: 50px; height: 50px; background: radial-gradient(circle, #fff, #ffeb3b, #f44336); border-radius: 50%; box-shadow: 0 0 40px #ff5722; pointer-events: none; z-index: 6000; }
        .drone-mini { position: absolute; width: 15px; height: 10px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 15px var(--neon); z-index: 800; transition: all 0.4s; }
        #log { position: absolute; bottom: 20px; right: 20px; width: 360px; height: 140px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); padding: 15px; font-size: 13px; border-radius: 12px; overflow-y: auto; color: #eee; z-index: 3000; line-height: 1.5; pointer-events: none; }
    </style>
</head>
<body>
<div id="profile-bar">
    <div id="profile-list" style="display:flex; gap:5px;"></div>
    <button class="profile-btn" onclick="createNewProfile()" style="background:#2e7d32; border-color:#fff;">+ НОВЫЙ</button>
</div>
<div id="ui">
    <div id="era-tag" class="era-tag">ЭПОХА: СРЕДНЕВЕКОВЬЕ</div>
    <div class="stat">💰 ЗОЛОТО: <span id="money">0</span></div>
    <div class="stat">🏰 ДВОРЕЦ: <span id="lvl">1</span></div>
    <div class="stat">⚔️ БОЙ: <span id="battleNum">1</span></div>
    <div id="met-status" style="color:var(--fire); font-weight:900; margin: 10px 0; font-size: 14px;">☄️ ОРУДИЕ БОГОВ: ГОТОВО</div>
    <button class="btn-grad" onclick="addMoney()">💎 СОБРАТЬ НАЛОГИ</button>
    <button class="btn-grad" id="upBtn" onclick="upgrade()">🏛️ УЛУЧШИТЬ ДВОРЕЦ (<span id="upCost">50</span>)</button>
    <hr>
    <div id="shop-1"></div><div id="shop-2"></div><div id="shop-3"></div>
    <button class="btn-grad" id="battle-btn" onclick="startBattle()">⚔️ В БОЙ!</button>
    <button id="era-btn" class="btn-grad" onclick="checkEraTransfer()" style="display:none; background:var(--neon); color:#000; border-color:#fff;">🚀 СОВЕРШИТЬ ЭВОЛЮЦИЮ</button>
    <button class="btn-grad" onclick="deleteCurrentProfile()" style="background: #333; font-size:10px; border-color: red; margin-top:20px;">УДАЛИТЬ МИР</button>
</div>
<div id="field">
    <div id="castle-wrap">
        <div class="tower t-side" id="ts1"></div>
        <div class="tower t-main" id="tm"><div id="main-dome" class="dome"></div><div id="gate"></div></div>
        <div class="tower t-side" id="ts2"></div>
    </div>
    <div id="units-layer"></div>
    <div id="log">> Система онлайн. Жду приказов, Лорд.</div>
</div>
<script>
    const STORAGE_KEY = 'citadel_v20_final';
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const config = {
        sword: { n: 'Мечник', e: 1, cost: 5, hp: 110, dmg: 40, ico: '⚔️', color: '#1565c0' },
        mace: { n: 'Булавоносец', e: 1, cost: 30, hp: 150, dmg: 60, ico: '🔨', color: '#6d4c41' },
        rider: { n: 'Всадник', e: 1, cost: 75, hp: 210, dmg: 90, ico: '🏇', color: '#1e88e5' },
        cannon: { n: 'Пушкарь', e: 1, cost: 160, hp: 130, dmg: 260, ico: '💣', color: '#424242' },
        giant: { n: 'Гигант', e: 1, cost: 450, hp: 1300, dmg: 480, ico: '👹', color: '#2e7d32', scale: 1.6 },
        iron_guard: { n: 'Страж', e: 1, cost: 1300, hp: 5500, dmg: 270, ico: '🛡️', color: '#455a64', scale: 1.8 },
        armored_car: { n: 'Броневик', e: 1, cost: 3500, hp: 16000, dmg: 750, ico: '🚜', color: '#37474f', scale: 2.1 },
        soldier: { n: 'Автоматчик', e: 2, cost: 7000, hp: 38000, dmg: 2200, ico: '🔫', color: '#2e7d32' },
        heavy: { n: 'Миниганер', e: 2, cost: 15000, hp: 70000, dmg: 5500, ico: '🔥', color: '#c62828', scale: 1.3 },
        tank: { n: 'Танк', e: 2, cost: 35000, hp: 200000, dmg: 14000, ico: '📟', color: '#1b5e20', scale: 2.5 },
        jet: { n: 'Истребитель', e: 2, cost: 70000, hp: 110000, dmg: 30000, ico: '✈️', color: '#37474f', scale: 2.8 },
        general: { n: 'Генерал', e: 2, cost: 150000, hp: 350000, dmg: 45000, ico: '🎖️', color: '#1a237e', isGen: true },
        titan: { n: 'Титан', e: 3, cost: 400000, hp: 900000, dmg: 80000, ico: '🗿', color: '#424242', scale: 3.5 },
        fly_titan: { n: 'Летающий', e: 3, cost: 800000, hp: 1200000, dmg: 120000, ico: '🦅', color: '#1a237e', scale: 3.8 },
        mecha_titan: { n: 'Меха-Т', e: 3, cost: 2000000, hp: 4000000, dmg: 250000, ico: '🤖', color: '#006064', scale: 4.2 },
        drone_titan: { n: 'Дрон-Т', e: 3, cost: 7000000, hp: 8000000, dmg: 500000, ico: '🛰️', color: '#311b92', isGen: true, scale: 4.5 },
        ultimate_titan: { n: 'ULTIMATE', e: 3, cost: 20000000, hp: 25000000, dmg: 2000000, ico: '🌌', color: '#000', scale: 5.5 }
    };

    let activeProfileName = "", profiles = {}, inBattle = false, activeP = [], activeE = [], battleLoop, meteorTimer = 0;

    function playSnd(f, t, d, v) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        try {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
        } catch(e){}
    }

    // МЕТЕОРИТНЫЙ ДОЖДЬ (7 СНАРЯДОВ)
    window.oncontextmenu = (e) => { e.preventDefault(); spawnMeteorRain(e.clientX, e.clientY); };

    function spawnMeteorRain(tx, ty) {
        if (meteorTimer > 0) { addLog(`Перезарядка: ${meteorTimer}с`); return; }
        meteorTimer = 30;

        for(let i=0; i<7; i++) {
            setTimeout(() => {
                const offX = (Math.random() - 0.5) * 160;
                const m = document.createElement('div'); m.className = 'meteor';
                m.style.left = (tx + offX) + 'px'; m.style.top = '-100px';
                document.body.appendChild(m);

                setTimeout(() => { m.style.transform = `translateY(${ty + 100}px)`; }, 20);

                setTimeout(() => {
                    document.getElementById('field').classList.add('shake-anim');
                    setTimeout(() => document.getElementById('field').classList.remove('shake-anim'), 400);
                    
                    const ring = document.createElement('div'); ring.className = 'ring';
                    ring.style.left = (tx + offX) + 'px'; ring.style.top = ty + 'px';
                    document.body.appendChild(ring); setTimeout(() => ring.remove(), 600);

                    playSnd(40 + Math.random()*40, 'sine', 0.8, 0.5);

                    activeE.forEach(e => {
                        if (Math.abs(e.x - (tx + offX - 320)) < 220) {
                            const dmg = 25000 * (profiles[activeProfileName].era);
                            e.hp -= dmg; spawnDamage(e.x, e.y, dmg); updateHP(e);
                        }
                    });
                    m.style.opacity = '0'; setTimeout(() => m.remove(), 200);
                }, 400);
            }, i * 220);
        }
    }
    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if(saved) profiles = JSON.parse(saved);
        if(!Object.keys(profiles).length) createProfile("Лорд");
        activeProfileName = Object.keys(profiles)[0];
        
        setInterval(() => {
            if(meteorTimer > 0) {
                meteorTimer--;
                document.getElementById('met-status').innerText = `☄️ ОРУДИЕ БОГОВ: ${meteorTimer}с`;
            } else { document.getElementById('met-status').innerText = `☄️ ОРУДИЕ БОГОВ: ГОТОВО`; }
        }, 1000);

        renderShops(); renderProfiles(); loadProfile();
    }

    function createProfile(name) {
        profiles[name] = { money: 500, lvl: 1, upCost: 50, armyInv: [], battleNum: 1, era: 1, bossDefeated: false };
        save();
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles)); }

    function loadProfile() {
        const p = profiles[activeProfileName];
        document.getElementById('money').innerText = Math.floor(p.money);
        document.getElementById('lvl').innerText = p.lvl;
        document.getElementById('upCost').innerText = Math.floor(p.upCost);
        document.getElementById('battleNum').innerText = p.battleNum;
        document.getElementById('era-tag').innerText = `ЭПОХА: ${['','СРЕДНЕВЕКОВЬЕ','МОДЕРН','КОСМОС'][p.era]}`;
        
        for(let i=1; i<=3; i++) document.getElementById(`shop-${i}`).style.display = (p.era === i ? 'block' : 'none');

        // ПРОВЕРКА ЭВОЛЮЦИИ (Нужна вся армия текущей эры + уровень + босс)
        const eraKeys = Object.keys(config).filter(k => config[k].e === p.era);
        const hasFullCollection = eraKeys.every(k => p.armyInv.some(u => u.type === k));
        const reqLvl = p.era === 1 ? 10 : 20;

        const eraBtn = document.getElementById('era-btn');
        if (hasFullCollection && p.lvl >= reqLvl && p.bossDefeated && p.era < 3) {
            eraBtn.style.display = 'block';
        } else { eraBtn.style.display = 'none'; }

        updateCastleGraphics(p.lvl, p.era);
    }

    function renderShops() {
        for(let i=1; i<=3; i++) {
            const container = document.getElementById(`shop-${i}`);
            container.innerHTML = "";
            Object.keys(config).forEach(key => {
                if(config[key].e === i) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-grad';
                    btn.innerHTML = `${config[key].ico} ${config[key].n} (${config[key].cost})`;
                    btn.onclick = () => buy(key);
                    container.appendChild(btn);
                }
            });
        }
    }

    function checkEraTransfer() {
        let p = profiles[activeProfileName];
        p.era++; p.money += p.era * 100000; p.bossDefeated = false;
        addLog(`ПРОРЫВ! ЭПОХА ${p.era === 2 ? 'МОДЕРНА' : 'ТИТАНОВ'} НАЧАЛАСЬ!`);
        save(); loadProfile();
    }

    function upgrade() { 
        let p = profiles[activeProfileName]; 
        let limit = p.era === 1 ? 10 : (p.era === 2 ? 20 : 30);
        if(p.money >= p.upCost && p.lvl < limit) { 
            p.money -= p.upCost; p.lvl++; p.upCost *= 1.95; 
            playSnd(600, 'triangle', 0.4, 0.2); save(); loadProfile(); 
        } else if (p.lvl >= limit) { addLog("Достигнут предел эры!"); }
    }

    function updateCastleGraphics(lvl, era) {
        const ts1 = document.getElementById('ts1'), ts2 = document.getElementById('ts2'), tm = document.getElementById('tm');
        let color = era === 1 ? '#ffc107' : (era === 2 ? '#00f2ff' : '#e91e63');
        [ts1, ts2, tm].forEach(el => {
            el.style.borderColor = color; el.style.boxShadow = `0 0 ${lvl*6}px ${color}`;
            el.style.height = (el.id === 'tm' ? 65+lvl*2 : 35+lvl*3) + '%';
            el.style.background = `repeating-linear-gradient(45deg, #263238, #263238 10px, #37474f 10px, #37474f 20px)`;
        });
        document.getElementById('main-dome').style.background = lvl >= 10 ? color : '#455a64';
    }

    function startBattle() {
        let p = profiles[activeProfileName];
        if (inBattle || !p.armyInv.length) return;
        inBattle = true; document.getElementById('gate').classList.add('open');
        activeP = p.armyInv.map(u => createUnit(u, false));
        
        let isBoss = (p.battleNum % 5 === 0);
        for(let i=0; i < p.battleNum + 1; i++) activeE.push(createUnit({type:'enemy'}, true));
        if(isBoss) activeE.push(createUnit({type:'boss'}, true, true));

        battleLoop = setInterval(() => {
            if (!activeP.length || !activeE.length) { endBattle(); return; }
            activeP.forEach(u => {
                let target = activeE[0];
                if (target && u.x < target.x - 90) { u.x += 16; u.dom.classList.add('walking'); } 
                else if(target) { 
                    u.dom.classList.remove('walking'); target.hp -= u.dmg/6; updateHP(target); 
                    if(u.isGen && Math.random() > 0.9) spawnMiniDrone(u.x, u.y, target);
                    if(Math.random() > 0.9) spawnDamage(target.x, target.y, u.dmg/6);
                }
                u.dom.style.left = u.x + 'px'; u.dom.style.zIndex = Math.floor(u.y);
            });
            activeE.forEach(e => {
                let target = activeP[0];
                if (target && e.x > target.x + 90) { e.x -= 14; e.dom.classList.add('walking'); } 
                else if(target) { e.dom.classList.remove('walking'); target.hp -= e.dmg/6; updateHP(target); }
                e.dom.style.left = e.x + 'px'; e.dom.style.zIndex = Math.floor(e.y);
            });
            activeP = activeP.filter(u => u.hp > 0 || (u.dom.remove() || false));
            activeE = activeE.filter(e => {
                if(e.hp <= 0) {
                    e.dom.remove(); 
                    profiles[activeProfileName].money += (e.isB ? 15000 : 300) * p.era;
                    if(e.isB) profiles[activeProfileName].bossDefeated = true;
                    activeP.forEach(pU => { pU.data.xp = Math.min(10, (pU.data.xp||0) + 1); });
                    loadProfile(); return false;
                } return true;
            });
        }, 100);
    }

    function endBattle() {
        clearInterval(battleLoop); inBattle = false; document.getElementById('gate').classList.remove('open');
        let p = profiles[activeProfileName];
        if(activeP.length > 0) { p.battleNum++; addLog("ПОБЕДА!"); playSnd(900, 'sine', 0.5, 0.3); } 
        else { addLog("АРМИЯ РАЗБИТА..."); playSnd(140, 'sawtooth', 0.5, 0.2); }
        p.armyInv = activeP.map(u => {
            if(u.data.xp >= 10) { u.data.level++; u.data.xp = 0; addLog(`${config[u.data.type].n} стал ВЕТЕРАНОМ!`); }
            return u.data;
        });
        document.querySelectorAll('.unit, .drone-mini, .ring').forEach(u => u.remove());
        activeP = []; activeE = []; save(); loadProfile();
    }

    function createUnit(u, isE, isB = false) {
        const d = document.createElement('div');
        d.className = 'unit' + (isE ? ' enemy' : '') + (u.level > 1 ? ' veteran' : '');
        let char = config[u.type] || { ico: isB?'👿':'💀', hp: 500 * (profiles[activeProfileName].battleNum), dmg: 100, color: '#b71c1c' };
        const s = isB ? 3.5 : (char.scale || 1);
        d.innerHTML = `<div class="hp-bar"><div class="hp-fill"></div></div><div class="h-head"></div><div class="h-body" style="background:${char.color}"></div><div class="h-leg l"></div><div class="h-leg r"></div><div class="w-ico">${char.ico}</div>`;
        d.style.left = (isE ? window.innerWidth - 450 : 350) + 'px';
        d.style.top = (150 + Math.random() * 300) + 'px';
        d.style.transform = `scale(${s}) ${isE ? 'scaleX(-1)' : ''}`;
        document.getElementById('units-layer').appendChild(d);
        return { dom: d, type: u.type, hp: char.hp, maxHp: char.hp, data: u, x: isE ? window.innerWidth-450 : 350, y: parseInt(d.style.top), dmg: char.dmg, isB, isGen: char.isGen };
    }

    function addLog(m) { const l = document.getElementById('log'); l.innerHTML = `> ${m}<br>${l.innerHTML}`; }
    function updateHP(u) { if(u.dom) u.dom.querySelector('.hp-fill').style.width = (u.hp/u.maxHp*100)+'%'; }
    function spawnDamage(x, y, d) {
        const p = document.createElement('div'); p.style.cssText = `position:absolute; left:${x}px; top:${y}px; color:red; font-weight:bold; animation: damagePop 0.8s forwards; z-index:5000; pointer-events:none;`;
        p.innerText = "-" + Math.floor(d); document.getElementById('field').appendChild(p); setTimeout(() => p.remove(), 800);
    }
    function spawnMiniDrone(x, y, target) {
        const d = document.createElement('div'); d.className = 'drone-mini'; d.style.left = x + 'px'; d.style.top = y + 'px';
        document.getElementById('units-layer').appendChild(d);
        setTimeout(() => { if(target && target.hp > 0) { target.hp -= 10000; updateHP(target); } d.remove(); }, 400);
    }
    function addMoney() { let p = profiles[activeProfileName]; p.money += (p.lvl * 45 * p.era); playSnd(1000, 'sine', 0.1, 0.1); loadProfile(); }
    function buy(t) { 
        let p = profiles[activeProfileName]; 
        if(p.money >= config[t].cost) { p.money -= config[t].cost; p.armyInv.push({type:t, level:1, xp:0}); playSnd(1100, 'sine', 0.1, 0.1); save(); loadProfile(); } 
    }
    function toggleNight() { document.getElementById('field').style.filter = (isNight = !isNight) ? "brightness(0.3) contrast(1.2) hue-
        // Продолжение функции toggleNight
        isNight) ? "brightness(0.3) contrast(1.2) hue-rotate(45deg)" : "none";
    }

    function renderProfiles() {
        const list = document.getElementById('profile-list'); 
        list.innerHTML = "";
        Object.keys(profiles).forEach(n => {
            const b = document.createElement('button'); 
            b.className = `profile-btn ${n === activeProfileName ? 'active' : ''}`;
            b.innerText = n; 
            b.onclick = () => { if(!inBattle){ activeProfileName = n; renderProfiles(); loadProfile(); } };
            list.appendChild(b);
        });
    }

    function createNewProfile() {
        const n = prompt("Введите имя нового Лорда:"); 
        if(n && n.trim() !== "") { 
            createProfile(n.trim()); 
            activeProfileName = n.trim(); 
            renderProfiles(); 
            loadProfile(); 
        }
    }

    function deleteCurrentProfile() {
        if(Object.keys(profiles).length <= 1) {
            alert("Нельзя уничтожить последний мир! Создайте другой, прежде чем удалять этот."); 
            return;
        }
        if(confirm("Вы уверены, что хотите стереть этот профиль и все достижения в нём?")) { 
            delete profiles[activeProfileName];
            activeProfileName = Object.keys(profiles)[0];
            save(); 
            location.reload(); // Перезагружаем, чтобы полностью очистить поле боя и UI
        }
    }

    // ЗАПУСК СИСТЕМЫ
    init();
</script>
</body>
</html>
